<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Партнёры — Конвертер валют</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        --bg: #0b1020;
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.78);
        --border: rgba(255, 255, 255, 0.16);
        --card: rgba(255, 255, 255, 0.1);
        --card2: rgba(255, 255, 255, 0.075);
        --radius: 18px;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f6f7fb;
          --text: rgba(0, 0, 0, 0.9);
          --muted: rgba(0, 0, 0, 0.68);
          --border: rgba(0, 0, 0, 0.1);
          --card: rgba(0, 0, 0, 0.04);
          --card2: rgba(0, 0, 0, 0.03);
          --shadow: 0 24px 80px rgba(10, 20, 40, 0.18);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial;
        color: var(--text);
        background: var(--bg);
      }

      .wrap {
        max-width: 880px;
        margin: 0 auto;
        padding: 28px 18px 44px;
      }

      .card {
        border-radius: var(--radius);
        background: linear-gradient(180deg, var(--card), var(--card2));
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        padding: 18px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 22px;
      }

      h2 {
        margin: 18px 0 8px;
        font-size: 15px;
      }

      p,
      li {
        color: var(--muted);
        line-height: 1.55;
      }

      a {
        color: inherit;
      }

      .top {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }

      .slot {
        border: 1px dashed var(--border);
        border-radius: 14px;
        padding: 14px;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <h1>Партнёры</h1>
        <a href="./">← На главную</a>
      </div>
      <div class="card">
        <p>Здесь могут быть партнёрские предложения. Если вы хотите разместиться — напишите владельцу проекта.</p>

        <h2>Слоты</h2>
        <div class="slot">
          <strong>Slot #1</strong>
          <p style="margin: 6px 0 0">Плашка на главной странице (блок “Партнёр”).</p>
        </div>

        <h2>Контакты</h2>
        <p>Для партнёрства: <a href="mailto:fafo322322@gmail.com">fafo322322@gmail.com</a></p>
      </div>
    </div>
  </body>
</html>
