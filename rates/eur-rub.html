<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Курс EUR к RUB сегодня — Конвертер валют</title>
    <meta name="description" content="Курс EUR к RUB на сегодня. 1 EUR = ? RUB. Быстрая ссылка на конвертер валют." />
    <link rel="canonical" href="https://unkyo.github.io/currency-converter/rates/eur-rub.html" />
    <style>
      :root{--bg:#0b1020;--text:rgba(255,255,255,.92);--muted:rgba(255,255,255,.78);--border:rgba(255,255,255,.16);--card:rgba(255,255,255,.1);--card2:rgba(255,255,255,.075);--radius:18px;--shadow:0 24px 80px rgba(0,0,0,.45)}
      @media (prefers-color-scheme: light){:root{--bg:#f6f7fb;--text:rgba(0,0,0,.9);--muted:rgba(0,0,0,.68);--border:rgba(0,0,0,.1);--card:rgba(0,0,0,.04);--card2:rgba(0,0,0,.03);--shadow:0 24px 80px rgba(10,20,40,.18)}}
      *{box-sizing:border-box} body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,Arial;color:var(--text);background:var(--bg)}
      .wrap{max-width:980px;margin:0 auto;padding:28px 18px 44px} .top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:12px}
      .card{border-radius:var(--radius);background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--border);box-shadow:var(--shadow);padding:18px}
      h1{margin:0 0 10px;font-size:22px} p{color:var(--muted);line-height:1.55} a{color:inherit}
      .rate{font-size:26px;font-weight:800;margin:10px 0 2px} .meta{color:var(--muted);font-size:13px}
      .btn{display:inline-block;margin-top:12px;padding:10px 12px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,.08);text-decoration:none}
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top"><h1>Курс EUR к RUB сегодня</h1><a href="./">← Курсы</a></div>
      <div class="card">
        <div class="rate" id="rate">Загрузка…</div>
        <div class="meta" id="meta">Источник: open.er-api.com</div>
        <p>Этот курс подходит для быстрой оценки. Для расчёта любой суммы откройте конвертер.</p>
        <a class="btn" href="../?from=EUR&to=RUB&amount=100">Открыть конвертер (100 EUR → RUB)</a>
      </div>
    </div>
    <script>
      (async () => {
        const rateEl = document.getElementById("rate");
        const metaEl = document.getElementById("meta");
        try {
          const res = await fetch("https://open.er-api.com/v6/latest/EUR", { headers: { Accept: "application/json" } });
          const data = await res.json();
          const r = Number(data?.rates?.RUB);
          if (!Number.isFinite(r)) throw new Error("bad rate");
          rateEl.textContent = `1 EUR = ${r.toFixed(4)} RUB`;
          metaEl.textContent = `Источник: open.er-api.com • обновлено: ${data?.time_last_update_utc || "—"}`;
        } catch {
          rateEl.textContent = "Не удалось загрузить курс";
          metaEl.textContent = "Проверьте интернет и попробуйте обновить страницу.";
        }
      })();
    </script>
  </body>
</html>
